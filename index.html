<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Asystent AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Asystent AI</h1>
        <p>Prosty prototyp strony z asystentem AI</p>
    </header>

    <main>
        <section class="assistant-container">
            <div class="assistant-window">
                <div id="chat-window">
                    <div class="message bot">
                        Cześć! Jestem Twoim asystentem AI. O co chcesz zapytać?
                    </div>
                </div>

                <form id="chat-form">
                    <input
                        type="text"
                        id="user-input"
                        placeholder="Napisz wiadomość..."
                        autocomplete="off"
                    >
                    <button type="submit">Wyślij</button>
                </form>
            </div>

            <aside class="assistant-list">
                <h2>Asystenci</h2>
                <button class="assistant-btn active" data-assistant="general">
                    Asystent ogólny
                </button>
                <button class="assistant-btn" data-assistant="coder">
                    Asystent programisty
                </button>
                <button class="assistant-btn" data-assistant="teacher">
                    Asystent nauczyciel
                </button>
            </aside>
        </section>
    </main>

    <footer>
        <p>Prototyp strony z asystentami AI</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
